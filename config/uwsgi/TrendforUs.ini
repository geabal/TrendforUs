[uwsgi]
plugin = /usr/lib/uwsgi/plugins/python3_plugin.so
chdir = /home/ubuntu/srv/TrendforUs/
module = config.wsgi:application
home = /home/ubuntu/trend4us/

uid = ubuntu
gid = ubuntu

socket = /tmp/TrendforUs.sock
chmod-socket = 666
chown-socket = ubuntu:ubuntu

enable-threads = true
master = true
vacuum = true
pidfile = /tmp/TrendforUs.pid
logto = /var/log/uwsgi/TrendforUs/@(exec://date +%%Y-%%m-%%d).log
log-reopen = true
